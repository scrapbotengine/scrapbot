name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install_args: odin
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install SDL3
        run: brew install sdl3
      - name: Build and test
        run: mise test
      - name: Build CLI
        run: mise build
      - name: Validation smoke tests
        run: |
          set -euo pipefail
          ./odin-out/scrapbot --version
          ./odin-out/scrapbot check examples/minimal
          ./odin-out/scrapbot step examples/minimal --frames=3 --format=json
          ./odin-out/scrapbot test tests/projects/health_tick
          ./odin-out/scrapbot bench examples/spawn_swarm --frames=60 --format=json
          ./odin-out/scrapbot render-test --editor --frames=60 examples/ui_gallery odin-out/ui-gallery-editor-render-test.png
      - name: Project and benchmark tests
        run: |
          set -euo pipefail
          ./odin-out/scrapbot test tests/projects
          ./odin-out/scrapbot bench examples/spawn_swarm --frames 60 --format=json
      - name: Render and visual tests
        run: |
          set -euo pipefail
          ./odin-out/scrapbot render-test examples/minimal odin-out/minimal-render-test.png
          ./odin-out/scrapbot render-test examples/showcase odin-out/showcase-render-test.png
          ./odin-out/scrapbot render-test examples/ui_gallery odin-out/ui-gallery-render-test.png
          ./odin-out/scrapbot render-test examples/spawn_swarm odin-out/spawn-swarm-render-test.png
          ./odin-out/scrapbot visual-test --update examples/minimal odin-out/minimal-visual-expected.png
          ./odin-out/scrapbot visual-test examples/minimal odin-out/minimal-visual-expected.png odin-out/minimal-visual-actual.png
      - name: Headful smoke
        run: ./odin-out/scrapbot run examples/minimal --hidden --frames 2
      - name: SDL and WebGPU smoke
        run: mise odin-sdl-smoke && mise odin-wgpu-surface-smoke

  linux:
    runs-on: ubuntu-latest
    container: ubuntu:25.10
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y ca-certificates git curl unzip xz-utils zstd build-essential clang libsdl3-dev libvulkan1 mesa-vulkan-drivers xvfb
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install_args: odin
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and test
        run: mise test
      - name: Build CLI
        run: mise build
      - name: Validation smoke tests
        run: |
          set -euo pipefail
          ./odin-out/scrapbot --version
          ./odin-out/scrapbot check examples/minimal
      - name: SDL and WebGPU smoke
        run: xvfb-run -a mise odin-sdl-smoke && xvfb-run -a mise odin-wgpu-surface-smoke

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install_args: odin
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install SDL3
        shell: pwsh
        run: |
          $sdlVersion = "3.4.10"
          $archive = Join-Path $env:RUNNER_TEMP "SDL3-devel-$sdlVersion-VC.zip"
          $installDir = Join-Path $env:RUNNER_TEMP "sdl3"
          Invoke-WebRequest -Uri "https://www.libsdl.org/release/SDL3-devel-$sdlVersion-VC.zip" -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $installDir
          $sdlRoot = Join-Path $installDir "SDL3-$sdlVersion"
          $sdlLinkDir = Join-Path $installDir "link"
          New-Item -ItemType Directory -Path $sdlLinkDir | Out-Null
          Copy-Item "$sdlRoot\lib\x64\SDL3.lib" $sdlLinkDir
          Copy-Item "$sdlRoot\lib\x64\SDL3.lib" .
          Add-Content -Path $env:GITHUB_ENV -Value "SDL_ROOT=$sdlRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "SDL_LINK_DIR=$sdlLinkDir"
          Add-Content -Path $env:GITHUB_PATH -Value "$sdlRoot\lib\x64"
      - name: Build Luau bridge
        shell: pwsh
        run: .\tools\build-odin-luau-bridge.ps1
      - name: Build CLI
        shell: pwsh
        run: |
          $odin = Join-Path $env:LOCALAPPDATA "mise\installs\odin\dev-2026-06\odin.exe"
          & $odin build odin-src/scrapbot -out:odin-out/scrapbot.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Stage SDL3 runtime
        shell: pwsh
        run: Copy-Item "$env:SDL_ROOT\lib\x64\SDL3.dll" odin-out\
      - name: Validation smoke tests
        shell: pwsh
        run: |
          function Invoke-Scrapbot {
            & .\odin-out\scrapbot.exe @args
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Invoke-Scrapbot --version
          Invoke-Scrapbot check examples/minimal
          Invoke-Scrapbot step examples/minimal --frames=3 --format=json
          Invoke-Scrapbot test tests/projects/health_tick
          Invoke-Scrapbot bench examples/spawn_swarm --frames=60 --format=json
          Invoke-Scrapbot render-test --editor --frames=60 examples/ui_gallery odin-out/ui-gallery-editor-render-test.png
      - name: Project and benchmark tests
        shell: pwsh
        run: |
          function Invoke-Scrapbot {
            & .\odin-out\scrapbot.exe @args
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Invoke-Scrapbot test tests/projects
          Invoke-Scrapbot bench examples/spawn_swarm --frames 60 --format=json
      - name: Render and visual tests
        shell: pwsh
        run: |
          function Invoke-Scrapbot {
            & .\odin-out\scrapbot.exe @args
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Invoke-Scrapbot render-test examples/minimal odin-out/minimal-render-test.png
          Invoke-Scrapbot render-test examples/showcase odin-out/showcase-render-test.png
          Invoke-Scrapbot render-test examples/ui_gallery odin-out/ui-gallery-render-test.png
          Invoke-Scrapbot render-test examples/spawn_swarm odin-out/spawn-swarm-render-test.png
          Invoke-Scrapbot visual-test --update examples/minimal odin-out/minimal-visual-expected.png
          Invoke-Scrapbot visual-test examples/minimal odin-out/minimal-visual-expected.png odin-out/minimal-visual-actual.png
      - name: Headful smoke
        shell: pwsh
        run: .\odin-out\scrapbot.exe run examples/minimal --hidden --frames 2
