name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: ci
          cache-size-limit: 4096
      - name: Install SDL3
        run: brew install sdl3
      - name: Build and test
        run: zig build test
      - name: Build CLI
        run: zig build -Doptimize=ReleaseFast
      - name: Project tests
        run: ./zig-out/bin/machina test tests/projects
      - name: Render smoke
        run: ./zig-out/bin/machina render-test examples/minimal zig-out/minimal-render-test.bmp
      - name: Headful smoke
        run: ./zig-out/bin/machina run examples/minimal --frames 2

  linux:
    runs-on: ubuntu-latest
    container: ubuntu:25.10
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y ca-certificates git xz-utils zstd build-essential libsdl3-dev libvulkan1 mesa-vulkan-drivers xvfb
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: ci
          cache-size-limit: 4096
      - name: Build and test
        run: zig build test
      - name: Build CLI
        run: zig build -Doptimize=ReleaseFast
      - name: Project tests
        run: ./zig-out/bin/machina test tests/projects
      - name: Render smoke
        run: ./zig-out/bin/machina render-test examples/minimal zig-out/minimal-render-test.bmp
      - name: Headful smoke
        run: xvfb-run -a ./zig-out/bin/machina run examples/minimal --frames 2

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: ci
          cache-size-limit: 4096
      - name: Install SDL3
        shell: pwsh
        run: |
          $sdlVersion = "3.4.10"
          $archive = Join-Path $env:RUNNER_TEMP "SDL3-devel-$sdlVersion-VC.zip"
          $installDir = Join-Path $env:RUNNER_TEMP "sdl3"
          Invoke-WebRequest -Uri "https://www.libsdl.org/release/SDL3-devel-$sdlVersion-VC.zip" -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $installDir
          $sdlRoot = Join-Path $installDir "SDL3-$sdlVersion"
          $sdlLinkDir = Join-Path $installDir "link"
          New-Item -ItemType Directory -Path $sdlLinkDir | Out-Null
          Copy-Item "$sdlRoot\lib\x64\SDL3.lib" $sdlLinkDir
          Add-Content -Path $env:GITHUB_ENV -Value "SDL_ROOT=$sdlRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "SDL_LINK_DIR=$sdlLinkDir"
          Add-Content -Path $env:GITHUB_PATH -Value "$sdlRoot\lib\x64"
      - name: Build and test
        shell: pwsh
        run: zig build test -Dtarget=x86_64-windows-msvc -Dsdl3_include_path="$env:SDL_ROOT\include" -Dsdl3_library_path="$env:SDL_LINK_DIR"
      - name: Build CLI
        shell: pwsh
        run: zig build -Dtarget=x86_64-windows-msvc -Dsdl3_include_path="$env:SDL_ROOT\include" -Dsdl3_library_path="$env:SDL_LINK_DIR"
      - name: Stage SDL3 runtime
        shell: pwsh
        run: Copy-Item "$env:SDL_ROOT\lib\x64\SDL3.dll" zig-out\bin\
      - name: Project tests
        shell: pwsh
        run: .\zig-out\bin\machina.exe test tests/projects
      - name: Render smoke
        shell: pwsh
        run: .\zig-out\bin\machina.exe render-test examples/minimal zig-out/minimal-render-test.bmp
      - name: Headful smoke
        shell: pwsh
        run: .\zig-out\bin\machina.exe run examples/minimal --frames 2
      - name: Build ReleaseFast CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: zig build -Dtarget=x86_64-windows-msvc -Doptimize=ReleaseFast -Dsdl3_include_path="$env:SDL_ROOT\include" -Dsdl3_library_path="$env:SDL_LINK_DIR"
