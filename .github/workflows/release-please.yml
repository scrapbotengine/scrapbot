name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  macos-release-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - uses: jdx/mise-action@v4
        with:
          install_args: odin
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install SDL3
        run: brew install sdl3

      - name: Build CLI
        run: mise build-odin

      - name: Bundle SDL3 runtime
        run: |
          set -euo pipefail
          sdl3_library="$(otool -L odin-out/scrapbot | awk '/libSDL3.*dylib/ { print $1; exit }')"
          if [ -z "${sdl3_library}" ]; then
            echo "failed to find linked SDL3 dylib in Odin binary" >&2
            exit 1
          fi
          rm -f odin-out/libSDL3.0.dylib
          cp "${sdl3_library}" odin-out/libSDL3.0.dylib
          install_name_tool -change "${sdl3_library}" "@executable_path/libSDL3.0.dylib" odin-out/scrapbot
          otool -L odin-out/scrapbot

      - name: Smoke test CLI
        run: ./odin-out/scrapbot version

      - name: Package archive
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          package_name="scrapbot-${VERSION}-macos-${ARCH}"
          package_dir="dist/${package_name}"

          mkdir -p "${package_dir}"
          cp odin-out/scrapbot "${package_dir}/"
          cp odin-out/libSDL3.0.dylib "${package_dir}/"
          cp LICENSE NOTICE "${package_dir}/"
          tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"

      - name: Upload archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: gh release upload "${TAG_NAME}" "dist/scrapbot-${VERSION}-macos-${ARCH}.tar.gz" --clobber
