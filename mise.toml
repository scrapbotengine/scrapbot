[tools]
node = "24"
pnpm = "10"
zig = "latest"

[tasks.build]
description = "Build the machina CLI optimized for interactive use"
run = "zig build -Doptimize=ReleaseFast"

[tasks.setup]
description = "Install workspace dependencies"
dir = "docs-website"
run = "pnpm install --frozen-lockfile"

[tasks.build-debug]
description = "Build the machina CLI with Debug safety checks"
run = "zig build -Doptimize=Debug"

[tasks.test]
description = "Run the full Machina test suite"
run = "zig build test && mise build && MACHINA_LEAK_CHECK=1 ./zig-out/bin/machina check examples/minimal && MACHINA_LEAK_CHECK=1 ./zig-out/bin/machina step examples/minimal --frames=3 --format=json && MACHINA_LEAK_CHECK=1 ./zig-out/bin/machina test tests/projects/health_tick && MACHINA_LEAK_CHECK=1 ./zig-out/bin/machina bench examples/spawn_swarm --frames=60 --format=json && MACHINA_LEAK_CHECK=1 ./zig-out/bin/machina render-test --editor --frames=60 examples/ui_gallery zig-out/ui-gallery-leak-render-test.bmp && ./zig-out/bin/machina test tests/projects && ./zig-out/bin/machina bench examples/spawn_swarm --frames 60 --format=json && ./zig-out/bin/machina render-test examples/minimal zig-out/minimal-render-test.bmp && ./zig-out/bin/machina render-test examples/showcase zig-out/showcase-render-test.bmp && ./zig-out/bin/machina render-test examples/ui_gallery zig-out/ui-gallery-render-test.bmp && ./zig-out/bin/machina render-test examples/spawn_swarm zig-out/spawn-swarm-render-test.bmp && ./zig-out/bin/machina render-test examples/native_motion zig-out/native-motion-render-test.bmp"

[tasks.luau-check]
description = "Run Luau editor type checks"
run = "bash tools/check-luau-types.sh"

[tasks.render-test]
description = "Render and verify example scenes"
run = "mise machina render-test examples/minimal zig-out/minimal-render-test.bmp && mise machina render-test examples/showcase zig-out/showcase-render-test.bmp && mise machina render-test examples/ui_gallery zig-out/ui-gallery-render-test.bmp && mise machina render-test examples/spawn_swarm zig-out/spawn-swarm-render-test.bmp && mise machina render-test examples/native_motion zig-out/native-motion-render-test.bmp"

[tasks.bench]
description = "Run headless Machina benchmarks"
run = "mise machina bench examples/spawn_swarm --frames 240"

[tasks.machina]
description = "Build and run the machina CLI"
run = "mise build && ./zig-out/bin/machina"

[tasks.docs-website]
description = "Run the docs website in development mode"
dir = "docs-website"
run = "pnpm dev --host 127.0.0.1 --port $CONDUCTOR_PORT"
