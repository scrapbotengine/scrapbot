[tools]
node = "24"
pnpm = "10"
zig = "latest"
odin = "dev-2026-06"

[tasks.build]
description = "Build the scrapbot CLI optimized for interactive use"
run = "zig build -Doptimize=ReleaseFast"

[tasks.setup]
description = "Install workspace dependencies"
dir = "docs-website"
run = "pnpm install --frozen-lockfile"

[tasks.build-debug]
description = "Build the scrapbot CLI with Debug safety checks"
run = "zig build -Doptimize=Debug"

[tasks.build-odin]
description = "Build the Odin migration scaffold"
run = "mise build-odin-luau-bridge && mkdir -p odin-out && odin build odin-src/scrapbot -out:odin-out/scrapbot"

[tasks.build-odin-luau-bridge]
description = "Build the C ABI Luau bridge used by the Odin migration scaffold"
run = "sh tools/build-odin-luau-bridge.sh"

[tasks.odin-smoke]
description = "Build and run the Odin migration scaffold"
run = "mise build-odin && ./odin-out/scrapbot --version"

[tasks.odin-sdl-smoke]
description = "Build and run the Odin SDL hidden-window smoke"
run = "mise build-odin && ./odin-out/scrapbot sdl-window-check --hidden"

[tasks.odin-wgpu-surface-smoke]
description = "Build and run Odin hidden SDL WebGPU surface presentation smokes"
run = "mise build-odin && mise build && ./odin-out/scrapbot wgpu-surface-check . --hidden && ./odin-out/scrapbot run examples/minimal --hidden --frames 2 --backend wgpu --render-output odin-out/wgpu-run-hidden.png"

[tasks.test-odin]
description = "Run Odin migration tests"
run = "mise build-odin-luau-bridge && odin test odin-src/scrapbot -define:ODIN_TEST_THREADS=1 -out:odin-out/scrapbot-tests"

[tasks.test]
description = "Run the full Scrapbot test suite"
run = "zig build test && mise build && SCRAPBOT_LEAK_CHECK=1 ./zig-out/bin/scrapbot check examples/minimal && SCRAPBOT_LEAK_CHECK=1 ./zig-out/bin/scrapbot step examples/minimal --frames=3 --format=json && SCRAPBOT_LEAK_CHECK=1 ./zig-out/bin/scrapbot test tests/projects/health_tick && SCRAPBOT_LEAK_CHECK=1 ./zig-out/bin/scrapbot bench examples/spawn_swarm --frames=60 --format=json && SCRAPBOT_LEAK_CHECK=1 ./zig-out/bin/scrapbot render-test --editor --frames=60 examples/ui_gallery zig-out/ui-gallery-leak-render-test.png && ./zig-out/bin/scrapbot test tests/projects && ./zig-out/bin/scrapbot bench examples/spawn_swarm --frames 60 --format=json && ./zig-out/bin/scrapbot render-test examples/minimal zig-out/minimal-render-test.png && ./zig-out/bin/scrapbot render-test examples/showcase zig-out/showcase-render-test.png && ./zig-out/bin/scrapbot render-test examples/ui_gallery zig-out/ui-gallery-render-test.png && ./zig-out/bin/scrapbot render-test examples/spawn_swarm zig-out/spawn-swarm-render-test.png && ./zig-out/bin/scrapbot render-test examples/native_motion zig-out/native-motion-render-test.png && ./zig-out/bin/scrapbot visual-test tests/golden/postprocess_effects tests/golden/postprocess_effects/expected.png zig-out/postprocess-effects-actual.png && ./zig-out/bin/scrapbot visual-test tests/golden/zero_lighting tests/golden/zero_lighting/expected.png zig-out/zero-lighting-actual.png"

[tasks.luau-check]
description = "Run Luau editor type checks"
run = "bash tools/check-luau-types.sh"

[tasks.render-test]
description = "Render and verify example scenes"
run = "mise scrapbot render-test examples/minimal zig-out/minimal-render-test.png && mise scrapbot render-test examples/showcase zig-out/showcase-render-test.png && mise scrapbot render-test examples/ui_gallery zig-out/ui-gallery-render-test.png && mise scrapbot render-test examples/spawn_swarm zig-out/spawn-swarm-render-test.png && mise scrapbot render-test examples/native_motion zig-out/native-motion-render-test.png"

[tasks.visual-test]
description = "Render and compare golden visual fixtures"
run = "mise scrapbot visual-test tests/golden/postprocess_effects tests/golden/postprocess_effects/expected.png zig-out/postprocess-effects-actual.png && mise scrapbot visual-test tests/golden/zero_lighting tests/golden/zero_lighting/expected.png zig-out/zero-lighting-actual.png"

[tasks.bench]
description = "Run headless Scrapbot benchmarks"
run = "mise scrapbot bench examples/spawn_swarm --frames 240"

[tasks.scrapbot]
description = "Build and run the scrapbot CLI"
run = "mise build && ./zig-out/bin/scrapbot"

[tasks.docs-website]
description = "Run the docs website in development mode"
dir = "docs-website"
run = "pnpm dev --host 127.0.0.1 --port $CONDUCTOR_PORT"
