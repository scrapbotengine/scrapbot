"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = "mise trust && mise install && mise setup"
run_mode = "concurrent"

[scripts.run.docs]
command = "mise docs-website"
icon = "book-open"

[scripts.run.example]
command = "mise machina run examples/spawn_swarm"
default = true
icon = "play"
